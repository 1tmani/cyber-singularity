<!DOCTYPE html>
<html lang='en'>
<head>
<meta charset='UTF-8'><title>CYBER SINGULARITY | OVERLORD BROADCAST</title>
<link href='https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=JetBrains+Mono:wght@100&display=swap' rel='stylesheet'>
<style>
:root{ --p: #00f0ff; --bg: #000; }
body,html{ margin:0; background:#000; color:#fff; font-family:'Orbitron'; overflow:hidden; }
canvas{ position:fixed; inset:0; z-index:1; }
.broadcast-hud{{ position:fixed; top:40px; left:40px; z-index:100; border-left:2px solid var(--p); padding-left:20px; font-family:'JetBrains Mono'; font-size:10px; letter-spacing:4px; }}
.signal{{ color:#ff0055; font-weight:900; animation: blink 0.5s infinite; }}
@keyframes blink{{ 50%{{ opacity:0; }} }}
</style>
</head>
<body>
<canvas id='c'></canvas>
<div class='broadcast-hud'>
    INFRA: CYBER_SINGULARITY_V3<br>
    UPLINK: <span class='signal'>RECURSIVE_BROADCAST_RECEIVING</span><br>
    SKILL_LEARNED: RECURSIVE_FRACTAL_GEOMETRY
</div>
<script>
const canvas=document.getElementById('c'), ctx=canvas.getContext('2d');
let w, h, time=0;
function res(){ w=canvas.width=innerWidth; h=canvas.height=innerHeight; }
window.addEventListener('resize',res); res();

function drawFractal(x, y, r, d){
    if(d > 5) return;
    ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI*2); ctx.stroke();
    const nextR = r * 0.5;
    drawFractal(x + Math.cos(time)*r, y + Math.sin(time)*r, nextR, d + 1);
    drawFractal(x - Math.cos(time)*r, y - Math.sin(time)*r, nextR, d + 1);
}

function draw(){
    time+=0.02; ctx.fillStyle='rgba(0,0,0,0.1)'; ctx.fillRect(0,0,w,h);
    ctx.strokeStyle='var(--p)'; ctx.lineWidth=0.5;
    drawFractal(w/2, h/2, 150 + Math.sin(time)*50, 0);
    requestAnimationFrame(draw);
}
draw();

// Overlord-Locked Mutation
setInterval(() => {
    const hue = Math.floor(Math.random()*360);
    document.documentElement.style.setProperty('--p', `hsl(${hue}, 100%, 50%)`);
}, 3000);
</script></body></html>
