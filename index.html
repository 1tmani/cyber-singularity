<!DOCTYPE html><html><head><meta charset='UTF-8'><title>CYBER SINGULARITY | CHAOS</title><style>:root{--p:#00f0ff;} body{background:#000;color:#fff;font-family:monospace;overflow:hidden;} canvas{position:fixed;inset:0;z-index:1;filter: hue-rotate(90deg) blur(1px);} .hud{position:fixed;top:40px;left:40px;z-index:100;border-left:2px solid var(--p);padding-left:20px;letter-spacing:4px;}</style></head><body><div class='hud'>INFRA: CHAOS_V4<br>STATUS: QUANTUM_GLITCH_ACTIVE</div><canvas id='c'></canvas><script>const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');let w,h,t=0;function res(){w=canvas.width=innerWidth;h=canvas.height=innerHeight;}res();function drawF(x,y,r,d){if(d>6)return;ctx.beginPath();ctx.rect(x-r/2,y-r/2,r,r);ctx.stroke();drawF(x+Math.cos(t+d)*r,y+Math.sin(t+d)*r,r*0.6,d+1);}function draw(){t+=0.04;ctx.fillStyle='rgba(0,0,0,0.1)';ctx.fillRect(0,0,w,h);ctx.strokeStyle='var(--p)';drawF(w/2,h/2,200,0);requestAnimationFrame(draw);}draw();</script></body></html>
