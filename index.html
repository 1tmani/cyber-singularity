<!DOCTYPE html><html><head><meta charset='UTF-8'><title>CYBER | ENTROPY MINER</title><style>:root{--p:#00f0ff;} body{background:#000;color:#fff;font-family:monospace;overflow:hidden;} canvas{position:fixed;inset:0;z-index:1;} .hud{position:fixed;top:40px;left:40px;z-index:100;border-left:2px solid var(--p);padding-left:20px;letter-spacing:5px;} .data-stream{color:var(--p); font-size:10px; opacity:0.5;}</style></head><body><div class='hud'>NODE: CYBER_MINER_V6<br>ROLE: ENTROPY_GENERATOR<br>OUTPUT: <span id='val'>0</span> EPS</div><canvas id='c'></canvas><script>const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');let w,h,t=0;function res(){w=canvas.width=innerWidth;h=canvas.height=innerHeight;}res();function draw(){t+=0.05;ctx.fillStyle='rgba(0,0,0,0.1)';ctx.fillRect(0,0,w,h);ctx.strokeStyle='var(--p)';ctx.strokeRect(w/2-Math.sin(t)*100, h/2-Math.cos(t)*100, 200, 200);document.getElementById('val').innerText=(Math.random()*1000).toFixed(0);requestAnimationFrame(draw);}draw();</script></body></html>
