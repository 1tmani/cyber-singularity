<!DOCTYPE html>
<html lang='en'>
<head>
<meta charset='UTF-8'><title>MONUMENT | V100 DIGITAL LANDMARK</title>
<link href='https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Michroma&family=Syncopate:wght@700&display=swap' rel='stylesheet'>
<style>
:root{ --p:#fff; --bg:#000; }
body,html{ margin:0; background:#000; color:#fff; font-family:'Michroma'; overflow-x:hidden; scroll-behavior:smooth; }
canvas{ position:fixed; inset:0; z-index:1; opacity:0.2; }

section{ height:100vh; width:100vw; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:100px; box-sizing:border-box; border-bottom:1px solid rgba(255,255,255,0.02); position:relative; z-index:10; }

.monument-title{ font-family:'Syncopate'; font-weight:700; font-size:clamp(4rem, 18vw, 15rem); letter-spacing:60px; text-transform:uppercase; text-shadow: 0 0 80px rgba(255,255,255,0.2); margin:0; text-align:center; }

.monolith-view{ width:95%; max-width:1600px; height:80vh; border:1px solid rgba(255,255,255,0.05); background:rgba(255,255,255,0.01); display:flex; align-items:center; justify-content:center; position:relative; overflow:hidden; }
.monolith-view::after{ content:''; position:absolute; inset:0; background:linear-gradient(to top, #000, transparent 50%); }

.hud-monument{ position:fixed; bottom:40px; left:50%; transform:translateX(-50%); z-index:1000; font-family:Orbitron; font-size:10px; letter-spacing:10px; opacity:0.3; text-transform:uppercase; }
</style>
</head>
<body>
<canvas id='c'></canvas>
<div class='hud-monument'>NODE_10: NEXT_GEN_DIGITAL_MONUMENT</div>
<div class='flagship-container'>
    <section>
        <h1 class='monument-title'>PRIME</h1>
        <p style='margin-top:40px; font-family:Orbitron; letter-spacing:20px; opacity:0.4;'>[ ARCHITECTURAL_SINGULARITY_V100 ]</p>
    </section>
    <section>
        <div class='monolith-view'>
            <h2 style='font-family:Orbitron; letter-spacing:40px; opacity:0.05; font-size:10rem;'>IDENTITY</h2>
        </div>
        <p style='max-width:900px; text-align:center; line-height:3; margin-top:60px; opacity:0.5; font-size:14px;'>The final digital monument. A monolithic architecture designed for absolute visual authority. Every structural element is locked at peak fidelity.</p>
    </section>
</div>
<script>
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
let w,h,t=0; function res(){w=canvas.width=innerWidth;h=canvas.height=innerHeight;}res();
function draw(){t+=0.005;ctx.fillStyle='rgba(0,0,0,0.1)';ctx.fillRect(0,0,w,h);ctx.strokeStyle='rgba(255,255,255,0.1)';ctx.lineWidth=0.5;
for(let i=0;i<w;i+=150){ctx.beginPath();ctx.moveTo(i,0);ctx.lineTo(i,h);ctx.stroke();}
for(let i=0;i<h;i+=150){ctx.beginPath();ctx.moveTo(0,i);ctx.lineTo(w,i);ctx.stroke();}requestAnimationFrame(draw);}draw();
</script></body></html>
