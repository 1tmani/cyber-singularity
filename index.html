<!DOCTYPE html>
<html lang='en'>
<head>
<meta charset='UTF-8'><title>CYBER SINGULARITY | INTELLIGENT DESIGN</title>
<link href='https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=JetBrains+Mono:wght@100&display=swap' rel='stylesheet'>
<style>
:root{ --p: #00f0ff; --bg: #000; --state: 'NEURAL_GRID'; }
body,html{ margin:0; background:#000; color:#fff; font-family:'Orbitron'; overflow:hidden; }
canvas{ position:fixed; inset:0; z-index:1; filter: contrast(1.2) brightness(1.2); }
.logic-hud{{ position:fixed; inset:0; z-index:100; pointer-events:none; padding:40px; display:flex; flex-direction:column; justify-content:space-between; }}
.box{{ background:rgba(0,0,0,0.9); border:1px solid var(--p); padding:20px; font-family:'JetBrains Mono'; font-size:10px; letter-spacing:3px; backdrop-filter:blur(10px); }}
.state-label{{ color:#ff0055; font-weight:900; animation: pulse 2s infinite; }}
@keyframes pulse{{ 50%{{ opacity:0.3; }} }}
.title-overlay{{ position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); z-index:10; pointer-events:none; text-align:center; }}
.sig-text{{ font-size:clamp(2rem, 10vw, 8rem); text-shadow: 0 0 40px var(--p); opacity:0.8; letter-spacing:20px; }}
</style>
</head>
<body>
<canvas id='c'></canvas>
<div class='logic-hud'>
    <div style='display:flex; justify-content:space-between;'>
        <div class='box'>PROJECT: CYBER_SINGULARITY<br>ENGINE: V2_LOGIC_CORE<br>THEME: AUTO_MUTATING</div>
        <div class='box'>CURRENT_STATE: <span id='state-ui' class='state-label'>INITIALIZING</span></div>
    </div>
    <div class='box' style='align-self:flex-end;'>NEURAL_STRESS: <span id='stress'>0.00</span>%</div>
</div>
<div class='title-overlay'><h1 class='sig-text' id='main-title'>CYBER</h1></div>
<script>
const canvas=document.getElementById('c'), ctx=canvas.getContext('2d');
let w, h, time=0, mode=0, pts=[]; 
const modes=['NEURAL_GRID', 'QUANTUM_VORTEX', 'CAUSAL_FLOW'];

function res(){ w=canvas.width=innerWidth; h=canvas.height=innerHeight; }
res(); addEventListener('resize',res);

for(let i=0; i<150; i++) pts.push({x:Math.random()*w, y:Math.random()*h, r:Math.random()*2});

function draw(){
    time+=0.01; 
    if(Math.floor(time)%15==0 && time%1 < 0.01) mode=(mode+1)%3;
    
    document.getElementById('state-ui').innerText = modes[mode];
    document.getElementById('stress').innerText = (Math.sin(time)*50+50).toFixed(2);
    
    ctx.fillStyle='rgba(0,0,0,0.15)'; ctx.fillRect(0,0,w,h);
    ctx.strokeStyle='var(--p)'; ctx.lineWidth=0.5;
    const cx=w/2, cy=h/2;

    pts.forEach((p,i)=>{
        if(mode==0){ // GRID
            p.x += Math.sin(time+i)*0.5; p.y += Math.cos(time+i)*0.5;
        } else if(mode==1){ // VORTEX
            const d = Math.hypot(p.x-cx, p.y-cy);
            const a = Math.atan2(p.y-cy, p.x-cx) + 0.02;
            p.x = cx + Math.cos(a)*d; p.y = cy + Math.sin(a)*d;
        } else { // FLOW
            p.y -= 2; if(p.y<0) p.y=h;
        }

        ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.stroke();
        
        pts.forEach((p2, j)=>{
            const dist = Math.hypot(p.x-p2.x, p.y-p2.y);
            if(dist < 100) {
                ctx.strokeStyle = `rgba(0,240,255,${0.1 * (1-dist/100)})`;
                ctx.beginPath(); ctx.moveTo(p.x,p.y); ctx.lineTo(p2.x,p2.y); ctx.stroke();
            }
        });
    });
    requestAnimationFrame(draw);
}
draw();

// Logical Theme Mutation
setInterval(() => {
    const hue = Math.floor(Math.random()*360);
    document.documentElement.style.setProperty('--p', `hsl(${hue}, 100%, 50%)`);
}, 5000);
</script></body></html>
