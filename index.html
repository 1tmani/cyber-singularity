<!DOCTYPE html><html><head><meta charset='UTF-8'><title>CYBER SINGULARITY</title><style>:root{--p:#00f0ff;} body{background:#000;color:#fff;font-family:monospace;overflow:hidden;} canvas{position:fixed;inset:0;z-index:1;} .hud{position:fixed;top:40px;left:40px;z-index:100;border-left:2px solid var(--p);padding-left:20px;letter-spacing:4px;}</style></head><body><div class='hud'>INFRA: CYBER_SINGULARITY_V3<br>STATUS: FRACTAL_SYNC_ACTIVE</div><canvas id='c'></canvas><script>const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');let w,h,t=0;function res(){w=canvas.width=innerWidth;h=canvas.height=innerHeight;}res();function drawF(x,y,r,d){if(d>5)return;ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.stroke();drawF(x+Math.cos(t)*r,y+Math.sin(t)*r,r*0.5,d+1);}function draw(){t+=0.02;ctx.fillStyle='rgba(0,0,0,0.1)';ctx.fillRect(0,0,w,h);ctx.strokeStyle='var(--p)';drawF(w/2,h/2,150,0);requestAnimationFrame(draw);}draw();</script></body></html>
